permissions:
  contents: write

name: package-extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: qq-copilot-connector-vsix
          path: qq-copilot-connector.vsix

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: qq-copilot-connector-vsix
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./qq-copilot-connector.vsix
          body_path: ./docs/release-notes.zh.md

  publish-marketplace:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [package, publish-release]
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Skip when VSCE_PAT is missing
        if: env.VSCE_PAT == ''
        run: echo "VSCE_PAT is not configured. Skip publishing to VS Code Marketplace."

      - name: Checkout
        if: env.VSCE_PAT != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.VSCE_PAT != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: env.VSCE_PAT != ''
        run: npm ci

      - name: Download VSIX artifact
        if: env.VSCE_PAT != ''
        uses: actions/download-artifact@v4
        with:
          name: qq-copilot-connector-vsix
          path: .

      - name: Verify Marketplace PAT
        if: env.VSCE_PAT != ''
        run: npx @vscode/vsce verify-pat mumu2023 --pat "$VSCE_PAT"

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath ./qq-copilot-connector.vsix --pat "$VSCE_PAT"